name: Spellcheck PoB repo
run-name: Spellcheck ${{ inputs.repo == 'PathOfBuilding-PoE2' && 'PoB2' || 'PoB' }} repo

on:
  workflow_dispatch:
    inputs:
      repo:
        description: Which PoB repo to checkout
        type: choice
        options:
        - PathOfBuilding
        - PathOfBuilding-PoE2
        default: PathOfBuilding

jobs:
  spellcheck:
    name: Spellcheck ${{ inputs.repo == 'PathOfBuilding-PoE2' && 'PoB2' || 'PoB' }} repo
    runs-on: ubuntu-latest
    env:
      ACTIONS_RUNNER_DEBUG: ${{ vars.ACTIONS_RUNNER_DEBUG }}
      ACTIONS_STEP_DEBUG: ${{ vars.ACTIONS_STEP_DEBUG }}
      TARGET_REPO: PathOfBuildingCommunity/${{ inputs.repo }}
      TARGET_REF: dev
    steps:
      - name: Add repo link to summary
        run: echo 'Repo [${{ inputs.repo }}](http://github.com/PathOfBuildingCommunity/${{ inputs.repo }})' >> $GITHUB_STEP_SUMMARY

      - name: Checkout dev ${{ inputs.repo }}
        uses: actions/checkout@v6
        with:
          ref: "dev"
          repository: "PathOfBuildingCommunity/${{ inputs.repo }}"

      - name: Fetch config file and dictionaries
        env:
          CONFIG_URL: https://raw.githubusercontent.com/Nightblade/pob-dict/main
        run:
          curl --silent --show-error --parallel --remote-name-all
            ${{ env.CONFIG_URL }}/cspell.json
            ${{ env.CONFIG_URL }}/pob-dict.txt
            ${{ env.CONFIG_URL }}/poe-dict.txt
            ${{ env.CONFIG_URL }}/ignore-dict.txt
            ${{ env.CONFIG_URL }}/extra-en-dict.txt
            ${{ env.CONFIG_URL }}/contribs-dict.txt

      - name: Run cspell
        id: cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          files: '**' # needed as workaround for non-incremental runs (overrides in config still work ok)
          config: "cspell.json"
          incremental_files_only: ${{ github.event_name != 'workflow_dispatch' }}
          verbose: true

      - name: Write results to summary
        if: always() && steps.cspell.outputs.number_of_issues != '0'
        run: |
          npx cspell "**" --config cspell.json --no-progress --no-summary 2>&1 \
            | sort \
            | awk -v repo="$TARGET_REPO" -v ref="$TARGET_REF" '
                match($0, /^([^:]+):([0-9]+):([0-9]+) - Unknown word \(([^)]+)\)$/, a) {
                  url = "https://github.com/" repo "/blob/" ref "/" a[1] "#L" a[2]
                  printf "| [%s](%s) | %s | %s |\n", a[1], url, a[2], a[4] >> "/tmp/cspell_rows.txt"
                  printf "%s:%s\n", a[1], a[2] >> "/tmp/cspell_plain.txt"
                }
              '

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Unknown Words (${{ steps.cspell.outputs.number_of_issues }} issues in ${{ steps.cspell.outputs.number_of_files_with_issues }} files)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Line | Word |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          cat /tmp/cspell_rows.txt >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Unknown Word Locations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/cspell_plain.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
